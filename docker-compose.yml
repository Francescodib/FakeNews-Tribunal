services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tribunal
      POSTGRES_PASSWORD: tribunal
      POSTGRES_DB: tribunal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribunal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
